<!-- components/header.html -->
<!-- Reusable header snippet. Reference only &mdash; not auto-included.
     Copy into any HTML page's <header> block as needed. -->

<header class="site-header" role="banner">
  <div class="container header-inner">
    <a href="/index.html" class="site-logo">Prop<span>Insight</span></a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="/index.html">Home</a>
      <a href="/pages/blog-list.html">Travel</a>
    </nav>

    <div class="header-controls">
      <div class="search-wrapper" role="search">
        <div class="search-input-wrapper" id="search-input-wrapper">
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search posts&#8230;"
            aria-label="Search posts"
            autocomplete="off"
          >
        </div>
        <button id="search-toggle-btn" class="search-toggle-btn" aria-label="Toggle search" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      <button class="theme-toggle-btn" data-theme-toggle aria-label="Toggle dark mode" type="button">
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button id="hamburger-btn" class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
</header>
